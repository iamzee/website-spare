version: "3.9"

services:
  app:
    build: .
    ports:
      - "80:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/sparc
      - PORT=3000
    env_file:
      - .env
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
